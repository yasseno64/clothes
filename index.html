<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>StyleSync Master</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--text:#0f172a;
--accent:#000;
}

.dark-mode{
--bg:#020617;
--card:#1e293b;
--text:#f8fafc;
--accent:#38bdf8;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
overflow-x:hidden;
}

button{
transition:.1s;
}

button:active{
transform:scale(.9);
opacity:.7;
}

.fashion-card{
background:var(--card);
border-radius:25px;
overflow:hidden;
border:1px solid rgba(0,0,0,.05);
}

.glass-nav{
background:rgba(255,255,255,.8);
backdrop-filter:blur(25px);
}

.dark-mode .glass-nav{
background:rgba(15,23,42,.8);
}

.loader-spin{
width:35px;
height:35px;
border:4px solid rgba(0,0,0,.1);
border-top:4px solid var(--accent);
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.toast-show{
opacity:1 !important;
transform:translate(-50%,-10px);
}

</style>
</head>

<body class="pb-32">

<!-- Toast -->
<div id="toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-2xl text-sm font-bold opacity-0 transition-all duration-300 z-[999]"></div>

<div class="fixed top-6 left-6 z-[100] flex flex-col gap-4">

<button onclick="toggleDarkMode()" class="w-14 h-14 rounded-full bg-white shadow-xl flex items-center justify-center text-2xl">
<span id="theme-icon">🌙</span>
</button>

<button onclick="resetSystem()" class="w-14 h-14 rounded-full bg-red-100 text-red-600 text-xs font-bold">
مسح
</button>

</div>

<header class="pt-12 pb-8 text-center">

<h1 class="text-5xl font-black italic">STYLE<span class="text-blue-500">SYNC</span></h1>

<p class="text-gray-400 text-xs mt-2 font-bold uppercase tracking-[0.3em]">Wardrobe</p>

</header>

<main class="max-w-md mx-auto px-6">

<section id="planner">

<div id="outfit-display" class="space-y-4 mb-8">

<div class="py-28 border-2 border-dashed border-gray-200 rounded-[40px] text-center text-gray-400 font-bold">

ابدأ يومك بتنسيق مثالي ✨

</div>

</div>

<button onclick="vibrate();generateOutfit()" class="w-full bg-black text-white py-6 rounded-[30px] font-black text-xl">

تنسيق طقم

</button>

<button id="confirm-btn" class="hidden w-full mt-4 border py-5 rounded-[30px] font-black" onclick="confirmOutfit()">

اعتمد اللبس

</button>

</section>

<section id="closet" class="hidden">

<div class="flex justify-between mb-6">

<h2 class="text-3xl font-black">الدولاب</h2>

<p id="closet-count"></p>

</div>

<div id="closet-grid" class="grid grid-cols-2 gap-4"></div>

<button onclick="openModal()" class="fixed bottom-36 right-8 w-20 h-20 bg-black text-white rounded-full text-4xl">+</button>

</section>

<section id="history" class="hidden">

<h2 class="text-3xl font-black mb-8">السجل</h2>

<div id="history-list" class="space-y-6"></div>

</section>

</main>

<nav class="fixed bottom-0 w-full glass-nav p-6 flex justify-around">

<button onclick="showSection('planner')">🏠</button>

<button onclick="showSection('closet')">👕</button>

<button onclick="showSection('history')">⏳</button>

</nav>

<!-- Upload Modal -->

<div id="uploadModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center">

<div class="bg-white rounded-[40px] p-10 w-full max-w-sm text-center">

<h3 class="text-2xl font-black mb-8">إضافة ملابس</h3>

<div class="grid gap-4">

<button onclick="triggerFile('Tops')" class="py-4 bg-gray-100 rounded-xl font-bold">👕 قطعة علوية</button>

<button onclick="triggerFile('Bottoms')" class="py-4 bg-gray-100 rounded-xl font-bold">👖 قطعة سفلية</button>

<button onclick="triggerFile('Shoes')" class="py-4 bg-gray-100 rounded-xl font-bold">👟 حذاء</button>

<button onclick="closeModal()" class="text-red-500 mt-4 font-bold">إلغاء</button>

</div>

<input type="file" id="fileInput" class="hidden" accept="image/*" multiple>

</div>

</div>

<script>

const DB_KEY='STYLE_SYNC_MASTER_FINAL';

let state=JSON.parse(localStorage.getItem(DB_KEY))||{closet:[],history:[],dark:false};

let activeCat='';

window.currentOutfit={};

function showToast(msg){

const t=document.getElementById("toast");

t.innerText=msg;

t.classList.add("toast-show");

setTimeout(()=>{t.classList.remove("toast-show");},2500);

}

function vibrate(){

if(navigator.vibrate) navigator.vibrate(30);

}

function triggerFile(cat){

activeCat=cat;

document.getElementById("fileInput").click();

}

document.getElementById("fileInput").addEventListener("change",async function(e){

const files=[...e.target.files];

for(let file of files){

await processImage(file);

}

save();

renderCloset();

closeModal();

showToast("تمت إضافة الملابس");

});

async function processImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=e=>{

const img=new Image();

img.onload=()=>{

const canvas=document.createElement("canvas");

const MAX=400;

canvas.width=MAX;

canvas.height=img.height*(MAX/img.width);

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

state.closet.push({

id:Date.now()+Math.random(),

img:canvas.toDataURL("image/jpeg",.6),

cat:activeCat,

clean:true

});

resolve();

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}

function generateOutfit(){

const display=document.getElementById("outfit-display");

display.innerHTML=`<div class="flex justify-center py-20"><div class="loader-spin"></div></div>`;

setTimeout(()=>{

const get=c=>state.closet.filter(i=>i.clean&&i.cat===c);

const t=get("Tops");

const b=get("Bottoms");

const s=get("Shoes");

if(!t.length||!b.length||!s.length){

showToast("أضف ملابس أولاً");

return;

}

window.currentOutfit={

Tops:t[Math.floor(Math.random()*t.length)],

Bottoms:b[Math.floor(Math.random()*b.length)],

Shoes:s[Math.floor(Math.random()*s.length)]

};

renderOutfit();

},700);

}

function renderOutfit(){

const d=document.getElementById("outfit-display");

d.innerHTML=Object.keys(window.currentOutfit).map(k=>`

<div class="fashion-card p-4 flex gap-4">

<img loading="lazy" src="${window.currentOutfit[k].img}" class="w-24 h-24 object-cover rounded-xl">

<div>

<p class="text-xs text-blue-500">${k}</p>

<p class="font-bold">قطعة مختارة</p>

</div>

</div>

`).join("");

document.getElementById("confirm-btn").classList.remove("hidden");

}

function confirmOutfit(){

Object.values(window.currentOutfit).forEach(o=>{

const item=state.closet.find(i=>i.id===o.id);

if(item) item.clean=false;

});

state.history.push({

date:new Date().toLocaleDateString("ar-EG"),

imgs:Object.values(window.currentOutfit).map(o=>o.img)

});

save();

showToast("تم حفظ الطقم");

location.reload();

}

function renderCloset(){

const grid=document.getElementById("closet-grid");

grid.innerHTML=state.closet.map(i=>`

<div class="fashion-card">

<img loading="lazy" src="${i.img}" class="w-full h-48 object-cover">

<div class="p-3 flex justify-between">

<span class="text-xs">${i.cat}</span>

<input type="checkbox" ${i.clean?'checked':''} onchange="toggleClean(${i.id})">

</div>

</div>

`).join("");

document.getElementById("closet-count").innerText=state.closet.length+" قطع";

}

function renderHistory(){

const list=document.getElementById("history-list");

list.innerHTML=state.history.map(h=>`

<div class="fashion-card p-4">

<p class="text-xs mb-3">${h.date}</p>

<div class="flex gap-2 overflow-x-auto">

${h.imgs.map(img=>`<img loading="lazy" src="${img}" class="w-16 h-16 object-cover rounded">`).join("")}

</div>

</div>

`).join("");

}

function save(){

localStorage.setItem(DB_KEY,JSON.stringify(state));

}

function toggleDarkMode(){

state.dark=!state.dark;

applyTheme();

save();

}

function applyTheme(){

document.body.classList.toggle("dark-mode",state.dark);

document.getElementById("theme-icon").innerText=state.dark?"☀️":"🌙";

}

function showSection(id){

document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

if(id==="closet") renderCloset();

if(id==="history") renderHistory();

}

function toggleClean(id){

const i=state.closet.find(c=>c.id===id);

if(i) i.clean=!i.clean;

save();

}

function resetSystem(){

if(confirm("مسح كل البيانات؟")){

localStorage.clear();

location.reload();

}

}

function openModal(){

document.getElementById("uploadModal").classList.remove("hidden");

}

function closeModal(){

document.getElementById("uploadModal").classList.add("hidden");

}

applyTheme();

showSection("planner");

</script>

</body>
</html>
