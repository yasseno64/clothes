<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleSync Pro | التنسيق التفاعلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); }
        .card-fashion { border-radius: 25px; transition: all 0.3s ease; background: white; overflow: hidden; }
        .section-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Switch Design */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #000; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Spinner */
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .editable-item:hover { border: 2px solid #000; cursor: pointer; transform: scale(1.02); }
    </style>
</head>
<body class="flex flex-col md:flex-row pb-20 md:pb-0">

    <nav class="fixed bottom-0 w-full glass border-t md:relative md:w-72 md:h-screen md:border-r md:border-t-0 z-[100] flex md:flex-col justify-around md:justify-start p-4 md:pt-12">
        <div class="hidden md:block mb-10 px-6">
            <h1 class="text-3xl font-black tracking-tighter uppercase">Style<br>Sync</h1>
            <div class="h-1.5 w-10 bg-black mt-2"></div>
        </div>
        <div class="flex md:flex-col w-full gap-2 md:gap-4">
            <button onclick="showSection('planner')" class="flex-1 md:flex-none flex flex-col md:flex-row items-center p-4 rounded-2xl hover:bg-white transition font-bold"><span class="text-2xl">✨</span><span class="md:mr-3">المنظم</span></button>
            <button onclick="showSection('closet')" class="flex-1 md:flex-none flex flex-col md:flex-row items-center p-4 rounded-2xl hover:bg-white transition font-bold"><span class="text-2xl">🧥</span><span class="md:mr-3">الدولاب</span></button>
            <button onclick="showSection('history')" class="flex-1 md:flex-none flex flex-col md:flex-row items-center p-4 rounded-2xl hover:bg-white transition font-bold"><span class="text-2xl">⏳</span><span class="md:mr-3">السجل</span></button>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-12 overflow-y-auto">
        <section id="planner" class="section-anim max-w-2xl mx-auto">
            <div class="mb-10 text-right">
                <h2 class="text-4xl font-black italic">EDITOR</h2>
                <p class="text-gray-500 font-medium">اضغط على أي قطعة لتغييرها يدوياً</p>
            </div>
            <div id="outfit-display" class="grid gap-6">
                </div>
            <div class="mt-8 flex flex-col gap-4">
                <button onclick="generateOutfit()" class="w-full bg-black text-white py-6 rounded-[30px] font-black text-xl shadow-2xl active:scale-95 transition-all">تنسيق عشوائي ✨</button>
                <button id="confirm-btn" onclick="confirmOutfit()" class="hidden w-full glass py-6 rounded-[30px] font-black text-xl border-2 border-black hover:bg-black hover:text-white transition-all">اعتمدت هذا اللبس ✅</button>
            </div>
        </section>

        <section id="closet" class="section-anim hidden">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-4xl font-black italic">CLOSET</h2>
                <p id="item-count" class="text-gray-500 font-bold">0 قطع</p>
            </div>
            <div id="closet-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6 pb-32"></div>
            <button onclick="openUploadModal()" class="fixed bottom-28 md:bottom-12 left-8 md:left-12 w-20 h-20 bg-black text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-[110] transition-all">+</button>
        </section>

        <section id="history" class="section-anim hidden">
            <h2 class="text-4xl font-black italic mb-10">HISTORY</h2>
            <div id="history-list" class="grid gap-4"></div>
        </section>
    </main>

    <div id="uploadModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[200] flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-md w-full text-center">
            <div id="modal-content">
                <h3 class="text-3xl font-black mb-8">إضافة ملابس</h3>
                <div class="grid gap-4">
                    <button onclick="triggerFile('Tops')" class="w-full py-5 rounded-2xl border-2 font-bold flex justify-between px-8 items-center"><span>👕 قِطع علوية</span><span>→</span></button>
                    <button onclick="triggerFile('Bottoms')" class="w-full py-5 rounded-2xl border-2 font-bold flex justify-between px-8 items-center"><span>👖 قِطع سفلية</span><span>→</span></button>
                    <button onclick="triggerFile('Shoes')" class="w-full py-5 rounded-2xl border-2 font-bold flex justify-between px-8 items-center"><span>👟 أحذية</span><span>→</span></button>
                    <button onclick="closeUploadModal()" class="mt-4 text-red-500 font-bold">إلغاء</button>
                </div>
            </div>
            <div id="loader" class="hidden flex-col items-center py-10"><div class="spinner mb-4"></div><p class="font-bold">جاري الرفع...</p></div>
            <input type="file" id="actualInput" class="hidden" accept="image/*" multiple>
        </div>
    </div>

    <div id="swapModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden z-[300] flex flex-col p-6">
        <div class="flex justify-between items-center mb-8 text-white">
            <h3 class="text-2xl font-black italic" id="swap-title">اختر بديل</h3>
            <button onclick="closeSwapModal()" class="text-3xl">✕</button>
        </div>
        <div id="swap-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 overflow-y-auto h-full">
            </div>
    </div>

    <script>
        let closet = JSON.parse(localStorage.getItem('ss_v3_closet')) || [];
        let history = JSON.parse(localStorage.getItem('ss_v3_history')) || [];
        let tempCat = '';
        let currentOutfit = { Tops: null, Bottoms: null, Shoes: null };

        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'closet') renderCloset();
            if(id === 'history') renderHistory();
        }

        // --- Upload & Compression ---
        function openUploadModal() { 
            document.getElementById('modal-content').style.display = 'block';
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('uploadModal').classList.remove('hidden'); 
        }
        function closeUploadModal() { document.getElementById('uploadModal').classList.add('hidden'); }
        function triggerFile(cat) { tempCat = cat; document.getElementById('actualInput').click(); }

        document.getElementById('actualInput').onchange = async function(e) {
            const files = e.target.files;
            if(!files.length) return;
            document.getElementById('modal-content').style.display = 'none';
            document.getElementById('loader').classList.remove('hidden');
            for(let file of files) { await processAndSave(file); }
            renderCloset(); closeUploadModal(); e.target.value = '';
        };

        function processAndSave(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * (MAX_WIDTH / img.width);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        closet.push({ id: Date.now() + Math.random(), image: canvas.toDataURL('image/jpeg', 0.6), category: tempCat, isClean: true });
                        save(); resolve();
                    };
                };
            });
        }

        // --- Stylist Logic ---
        function generateOutfit() {
            const get = (cat) => closet.filter(i => i.isClean && i.category === cat);
            const t = get('Tops'), b = get('Bottoms'), s = get('Shoes');
            if(!t.length || !b.length || !s.length) return alert("تأكد من وجود قطع نظيفة في كل قسم!");

            currentOutfit.Tops = t[Math.floor(Math.random()*t.length)];
            currentOutfit.Bottoms = b[Math.floor(Math.random()*b.length)];
            currentOutfit.Shoes = s[Math.floor(Math.random()*s.length)];

            renderOutfitDisplay();
        }

        function renderOutfitDisplay() {
            const display = document.getElementById('outfit-display');
            display.innerHTML = Object.keys(currentOutfit).map(cat => {
                const item = currentOutfit[cat];
                return `
                <div onclick="openSwapModal('${cat}')" class="glass p-4 rounded-[30px] flex items-center gap-6 shadow-xl editable-item transition-all">
                    <img src="${item.image}" class="w-24 h-24 md:w-32 md:h-32 object-cover rounded-2xl shadow-md border-2 border-white">
                    <div class="text-right flex-1">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">${cat}</p>
                        <p class="text-lg font-bold italic leading-tight">اضغط للتبديل</p>
                    </div>
                    <span class="text-gray-300">🔄</span>
                </div>`;
            }).join('');
            document.getElementById('confirm-btn').classList.remove('hidden');
        }

        // --- Manual Swap Feature ---
        function openSwapModal(category) {
            tempCat = category;
            const alternatives = closet.filter(i => i.isClean && i.category === category);
            document.getElementById('swap-title').innerText = `تبديل الـ ${category}`;
            const grid = document.getElementById('swap-grid');
            grid.innerHTML = alternatives.map(item => `
                <div onclick="selectReplacement(${item.id})" class="card-fashion border-4 ${currentOutfit[category].id === item.id ? 'border-black' : 'border-transparent'}">
                    <img src="${item.image}" class="w-full h-40 object-cover">
                </div>
            `).join('');
            document.getElementById('swapModal').classList.remove('hidden');
        }

        function closeSwapModal() { document.getElementById('swapModal').classList.add('hidden'); }

        function selectReplacement(id) {
            const newItem = closet.find(i => i.id === id);
            currentOutfit[tempCat] = newItem;
            renderOutfitDisplay();
            closeSwapModal();
        }

        function confirmOutfit() {
            Object.values(currentOutfit).forEach(o => {
                const item = closet.find(c => c.id === o.id);
                if(item) item.isClean = false;
            });
            history.push({ date: new Date().toLocaleDateString('ar-EG'), count: 3 });
            save(); location.reload();
        }

        // --- Rendering ---
        function renderCloset() {
            const grid = document.getElementById('closet-grid');
            document.getElementById('item-count').innerText = `${closet.length} قطع`;
            grid.innerHTML = closet.map(i => `
                <div class="card-fashion relative group">
                    <img src="${i.image}" class="w-full h-48 object-cover">
                    <button onclick="deleteItem(${i.id})" class="absolute top-2 left-2 w-7 h-7 bg-white/90 rounded-full text-red-500 text-xs opacity-0 group-hover:opacity-100 transition shadow">✕</button>
                    <div class="p-4 flex justify-between items-center bg-white border-t">
                        <span class="text-[10px] font-black text-gray-400 uppercase">${i.category}</span>
                        <label class="switch">
                            <input type="checkbox" ${i.isClean?'checked':''} onchange="toggleClean(${i.id})">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>`).join('');
        }

        function toggleClean(id) {
            const i = closet.find(c => c.id === id);
            i.isClean = !i.isClean; save(); renderCloset();
        }

        function deleteItem(id) {
            if(confirm("حذف؟")) { closet = closet.filter(c => c.id !== id); save(); renderCloset(); }
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.slice().reverse().map(h => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center">
                    <span class="font-black text-gray-400 uppercase">×${h.count} PIECES</span>
                    <span class="font-bold">${h.date}</span>
                </div>`).join('');
        }

        function save() {
            localStorage.setItem('ss_v3_closet', JSON.stringify(closet));
            localStorage.setItem('ss_v3_history', JSON.stringify(history));
        }

        showSection('planner');
    </script>
</body>
</html>
